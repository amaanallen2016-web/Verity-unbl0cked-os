<meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Verity" />
    <title>Verity</title>

    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/amaanallen2016-web/Verity-unbl0cked-os@main/styles/index.css" />

    <script>
      // 
      const base1 = "https://";
      const base2 = "esm.sh/";
      const base3 = "react@";
      const base4 = "18.3.1";
      const base5 = "/client";

      // 
      const reactUrl = base1 + base2 + base3 + base4; 
      const domUrl = base1 + base2 + "react-dom@" + base4;
      const domClientUrl = domUrl + base5;

      // 
      const im = document.createElement('script');
      im.type = 'importmap';
      im.textContent = JSON.stringify({
        imports: {
          "react": reactUrl,
          "react-dom": domUrl,
          "react-dom/client": domClientUrl
        }
      });
      document.currentScript.after(im);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <script type="module">
      // 
      if (window.location.pathname !== "/") {
        window.history.replaceState(null, "", "/");
      }

      // 
      const p1 = "https://esm.sh/";
      const p2 = "gh/amaanallen2016-web/";
      const p3 = "Verity-unbl0cked-os/";
      const p4 = "src/main.tsx";
      const p5 = "?deps=react@18.3.1,react-dom@18.3.1";

      const fullUrl = p1 + p2 + p3 + p4 + p5;
      import(fullUrl);
    </script>
  </body>
</html>
